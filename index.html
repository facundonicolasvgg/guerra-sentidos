solid var(--accent);border-radius:20px;padding:25px;box-sizing:border-box;display:flex;flex-direction:column;box-shadow:0 8px 25px rgba(0,0,0,0.6);}.card-instruction{font-size:1.15rem;line-height:1.5;color:#e2d9f3;margin-bottom:15px;font-weight:500;}.pos-image{display:none;justify-content:center;align-items:center;margin:15px 0;background:#0d0818;padding:12px;border-radius:15px;border:1px solid rgba(255,42,95,0.4);}.pos-image img{width:100%;max-height:220px;object-fit:contain;border-radius:10px;}.card-consequence{background:rgba(255,42,95,0.1);border:1px dashed var(--accent);padding:12px;border-radius:8px;font-size:0.9rem;color:#ff7ea0;margin-top:10px;line-height:1.4;}</style></head><body><header><h1>La Guerra de los Sentidos</h1><p>Edición Sex Position Club</p></header><div class="container"><div class="setup-section" id="setupSection"><h3>Configuración</h3><p style="font-size:0.9rem;color:var(--text-muted);margin:0;">Introducid vuestros nombres para empezar:</p><div class="input-group"><input type="text" id="p1" class="input-field" placeholder="Jugador/a 1"><input type="text" id="p2" class="input-field" placeholder="Jugador/a 2"><button class="btn" id="startBtn">Comenzar Juego</button></div></div><div id="gameArea"><div class="turn-indicator" id="turnIndicator">Turno de...</div><div class="game-card"><div class="card-instruction" id="cardInstruction">Esperando inicio...</div><div class="pos-image" id="posImage"></div><div class="card-consequence" id="cardConsequence">Penitencia...</div></div><button class="btn" id="nextCardBtn">Siguiente Tarjeta</button><button class="btn btn-climax" id="climaxBtn">Cuando alguien se quede desnudo pulsar aquí 🔞</button></div></div><script>let players=[];let currentTurn=0;let cardCount=1;let climaxMode=false;let climaxIndex=0;const normalCards=["{O} debe vendarle los ojos a {V}. {O} preparará un sorbo de alguna bebida disponible. {V} debe adivinar qué bebida es solo por el gusto y el olor.","{V} se tapa los ojos. {O} debe susurrarle ligeramente hacia atrás apoyando las manos en la cama para tener más estabilidad, permitiendo que {V} cambie el eje del movimiento vertical."},{img:"loto_v3.jpg",text:"¡LOTO V3! En esta variante, {V} estira las piernas hacia los lados o hacia atrás en lugar de rodear a {O}, variando la apertura de la pelvis y facilitando que ambos jueguen con un balanceo horizontal más profundo."},{img:"loto_v4.jpg",text:"¡LOTO V4! {O} mantiene la postura sentada pero {V} se coloca de espaldas a él, sentándose sobre su regazo. {O} tiene los brazos totalmente libres para acariciar el vientre, pechos o piernas de {V} durante la penetración."},{img:"loto_v5.jpg",text:"¡LOTO V5! {O} se arrodilla verticalmente y {V} se sienta sobre sus muslos entrelazando sus piernas. Requiere un poco más de equilibrio pero genera un juego de alturas muy estimulante."},{img:"loto_v6.jpg",text:"¡LOTO V6! Ambos se sientan frente a frente pero con las piernas entrelazadas de manera alterna. Es una postura de descanso y estimulación mutua muy suave, excelente para prolongar el momento."},{img:"loto_v7.jpg",text:"¡LOTO V7! La variación de máxima conexión física: ambos cuerpos pegados en loto total, pero {O} aprovecha para levantar sutilmente el cuerpo de {V} suspendiendo parte de su peso, logrando un ritmo único."},{img:"",text:"¡CONEXIÓN FINAL! El repertorio ha terminado. Elegid vuestra variante favorita del Misionero o del Loto que acabáis de ver y disfrutad juntos libremente a vuestro propio ritmo."}];function getCard(){let rawText="";let imgUrl="";if(climaxMode){if(climaxIndex<sexualCards.length){rawText=sexualCards[climaxIndex].text;imgUrl=sexualCards[climaxIndex].img;}else{rawText=sexualCards[sexualCards.length-1].text;imgUrl=sexualCards[sexualCards.length-1].img;}}else{rawText=normalCards[Math.floor(Math.random()*normalCards.length)];}const v=players[currentTurn];const o=players[(currentTurn+1)%2];document.getElementById('cardInstruction').innerHTML=rawText.replace(/{V}/g,v).replace(/{O}/g,o);const imgDiv=document.getElementById('posImage');if(climaxMode && imgUrl){imgDiv.innerHTML=`<img src="${imgUrl}" alt="Posición">`;imgDiv.style.display='flex';}else{imgDiv.style.display='none';}const consQ=document.getElementById('cardConsequence');if(climaxMode){consQ.innerHTML=`<strong>MODO CLÍMAX:</strong> Ambos estáis al descubierto. Mantened la posición y disfrutad de la fricción.`;}else{consQ.innerHTML=`<strong>SI ${v.toUpperCase()} FALLA:</strong> ${o} elige y le quita una prenda a ${v}.<br><br><strong>SI ${v.toUpperCase()} ACIERTA:</strong> Continúa el juego.`;}document.getElementById('turnIndicator').textContent=`Turno de: ${v}`;}document.getElementById('startBtn').addEventListener('click',()=>{const p1=document.getElementById('p1').value.trim();const p2=document.getElementById('p2').value.trim();if(p1 && p2){players=[p1,p2];document.getElementById('setupSection').style.display='none';document.getElementById('gameArea').style.display='flex';getCard();}else{alert("Por favor, introducid ambos nombres para comenzar.");}});document.getElementById('nextCardBtn').addEventListener('click',()=>{if(climaxMode){climaxIndex++;}else{cardCount++;}currentTurn=(currentTurn+1)%2;if(cardCount>=4&&!climaxMode){document.getElementById('climaxBtn').style.display='block';}getCard();});document.getElementById('climaxBtn').addEventListener('click',()=>{climaxMode=true;document.getElementById('climaxBtn').style.display='none';currentTurn=(currentTurn+1)%2;climaxIndex=0;getCard();});</script></body></html>
