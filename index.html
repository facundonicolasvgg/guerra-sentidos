            usedPicanteCards.push(randomIndex);
            rawText = tusPreguntasPicantes[randomIndex];
        }else{
            if(usedNormalCards.length === normalCards.length){
                usedNormalCards = [];
            }
            let randomIndex;
            do{
                randomIndex = Math.floor(Math.random()*normalCards.length);
            }while(usedNormalCards.includes(randomIndex));
            
            usedNormalCards.push(randomIndex);
            rawText = normalCards[randomIndex];
        }
    }
    
    document.getElementById('cardInstruction').innerHTML = rawText.replace(/{V}/g,v).replace(/{O}/g,o);
    
    const imgDiv = document.getElementById('posImage');
    if(climaxMode && imgUrl){
        imgDiv.innerHTML = `<img src="${imgUrl}" alt="Posición">`;
        imgDiv.style.display = 'flex';
    }else{
        imgDiv.style.display = 'none';
    }
    
    const consQ = document.getElementById('cardConsequence');
    if(climaxMode){
        consQ.innerHTML = `<strong>Disfrutad de la noche</strong>`;
    }else{
        if(selectedVersion === "normal"){
            // VERSIÓN ORIGINAL PARA TARJETAS NORMALES:
            consQ.innerHTML = `<strong>EL PRECIO DE FALLAR EL RETO:</strong><br>• Si no logras cumplir el reto sensorial o responder bien, te quitas 1 prenda 👙 o tomas 2 tragos largos 🍻 (A elección del rival).`;
        } else {
            // VERSIÓN PICANTE CONTROLADA CON ROTACIÓN DE 4 ESTADOS:
            if(penitenceToggle === 0){
                consQ.innerHTML = `<strong>EL PRECIO DE LA VERDAD (Fase Alcohol):</strong><br>• Si <strong>${v.toUpperCase()}</strong> responde: Toma 1 trago corto 🍻.<br>• Si se niega: Bebe 3 tragos de golpe.`;
                penitenceToggle = 1;
            }else if(penitenceToggle === 1){
                consQ.innerHTML = `<strong>EL PRECIO DE LA VERDAD (Fase Prenda):</strong><br>• Si <strong>${v.toUpperCase()}</strong> responde: ¡Te salvas! No pasa nada.<br>• Si se niega: <strong>${o}</strong> elige y te quita 1 prenda 👙.`;
                penitenceToggle = 2;
            }else if(penitenceToggle === 2){
                consQ.innerHTML = `<strong>EL PRECIO DE LA VERDAD (Fase Confesión):</strong><br>• Si <strong>${v.toUpperCase()}</strong> responde: ¡Brindis! Ambos tomáis 1 trago.<br>• Si se niega: <strong>${v.toUpperCase()}</strong> se toma 3 tragos largos.`;
                penitenceToggle = 3;
            }else{
                consQ.innerHTML = `<strong>EL PRECIO DE LA VERDAD (Fase Apuesta Máxima):</strong><br>• Si <strong>${v.toUpperCase()}</strong> responde: <strong>${o}</strong> te quita 1 prenda.<br>• Si se niega: ¡Te quitas 2 prendas tú mismo/a!`;
                penitenceToggle = 0;
            }
        }
    }
    document.getElementById('turnIndicator').textContent = `Turno de: ${v}`;
}

document.getElementById('startBtn').addEventListener('click',()=>{
    const p1 = document.getElementById('p1').value.trim();
    const p2 = document.getElementById('p2').value.trim();
    if(p1 && p2){
        players = [p1,p2];
        selectedVersion = document.querySelector('input[name="gameMode"]:checked').value;
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('gameArea').style.display = 'flex';
        getCard();
    }else{
        alert("Por favor, introducid ambos nombres para comenzar.");
    }
});

document.getElementById('nextCardBtn').addEventListener('click',()=>{
    if(climaxMode){
        climaxIndex++;
    }else{
        cardCount++;
    }
    currentTurn = (currentTurn+1)%2;
    if(cardCount >= 2 && !climaxMode){
        document.getElementById('climaxBtn').style.display = 'block';
    }
    getCard();
});

document.getElementById('climaxBtn').addEventListener('click',()=>{
    climaxMode = true;
    document.getElementById('climaxBtn').style.display = 'none';
    currentTurn = (currentTurn+1)%2;
    climaxIndex = 0;
    getCard();
});
</script></body></html>
