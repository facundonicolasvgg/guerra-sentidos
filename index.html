<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>La Guerra de los Sentidos - Edición Colegas</title><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><style>:root{--bg:#0b0612;--card-bg:#160f24;--accent:#ff2a5f;--accent-sub:#9d1df2;--text:#ffffff;--text-muted:#a59ba3;}body{margin:0;padding:20px;background:radial-gradient(circle at top, #1a0b2e, var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;box-sizing:border-box;}header{text-align:center;margin-bottom:15px;}h1{margin:0;font-size:1.8rem;background:linear-gradient(45deg,var(--accent),var(--accent-sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}header p{margin:5px 0 0 0;color:var(--text-muted);font-size:0.85rem;font-style:italic;}.container{width:100%;max-width:440px;display:flex;flex-direction:column;gap:15px;}h3{margin:0 0 10px 0;}.setup-section{background:var(--card-bg);padding:20px;border-radius:20px;border:1px solid #2d1b4e;box-shadow:0 10px 30px rgba(0,0,0,0.5);}.player-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}.input-field{padding:12px;border-radius:10px;border:1px solid #443266;background:#201435;color:white;font-size:1rem;flex:1;box-sizing:border-box;}.select-sex{padding:12px;border-radius:10px;border:1px solid #443266;background:#201435;color:white;font-size:1rem;cursor:pointer;}.btn{padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(255,42,95,0.3);width:100%;box-sizing:border-box;margin-top:5px;}.btn-secondary{background:#3b2366;box-shadow:none;margin-bottom:10px;}.btn-climax{background:linear-gradient(45deg, #2a085c, #660022);border:1px solid #ff0055;margin-top:10px;display:none;}#gameArea{display:none;flex-direction:column;gap:15px;width:100%;}.turn-indicator{text-align:center;font-size:1.1rem;font-weight:bold;color:#ffde59;margin-bottom:5px;}.game-card{width:100%;background:#201633;border:2px solid var(--accent);border-radius:20px;padding:25px;box-sizing:border-box;display:flex;flex-direction:column;box-shadow:0 8px 25px rgba(0,0,0,0.6);}.card-instruction{font-size:1.15rem;line-height:1.5;color:#e2d9f3;margin-bottom:15px;font-weight:500;}.card-consequence{background:rgba(255,42,95,0.1);border:1px dashed var(--accent);padding:12px;border-radius:8px;font-size:0.9rem;color:#ff7ea0;margin-top:10px;line-height:1.4;}</style></head><body><header><h1>La Guerra de los Sentidos</h1><p>Edición Colegas & Barra Libre</p></header><div class="container"><div class="setup-section" id="setupSection"><h3>Participantes</h3><div id="playersContainer"></div><button class="btn" id="startBtn">Comenzar Desmadre</button></div><div id="gameArea"><div class="turn-indicator" id="turnIndicator">Turno de...</div><div class="game-card"><div class="card-instruction" id="cardInstruction">Cargando retos...</div><div class="card-consequence" id="cardConsequence">Penitencia...</div></div><button class="btn" id="nextCardBtn">Siguiente Tarjeta</button><button class="btn btn-climax" id="climaxBtn">Alguien se ha quedado sin ropa</button></div></div><script>let players=[];let currentTurn=0;let cardCount=1;let climaxStage=0;let penitenceToggle=0;

const poolFase1Orig=[
"{P1} debe servirse un chupito extra, llenarlo hasta arriba y bebérselo sin usar las manos antes de que {P2} cuente hasta 5. ¡A toda pastilla!",
"Duelo de tragos: {P1} y {P2} chocan sus vasos y tienen que dar 4 tragos largos seguidos sin apartar la mirada. El primero que mire a otro lado, se toma otro trago de regalo.",
"El teléfono del pecado: {P1} tiene que enseñar la última foto de fiesta que tenga en su galería o meterse un chupito doble del tirón.",
"{P1} tiene que imitar el gemido de un dibujo animado famoso. Si {P2} se parte de risa, {P2} bebe dos tragos. Si da cringe, se los toma {P1}.",
"Cascada extrema: Ambos empiezan a beber de su copa a la vez. {P1} marca el ritmo y no puede parar hasta que tenga ganas, {P2} está obligado a aguantar el tipo.",
"El susurro gamberro: {P1} le dice una burrada tremenda al oído a {P2}. Si {P2} repite en voz alta lo que ha escuchado, {P1} bebe. Si se calla por vergüenza, bebe {P2}.",
"Piedra, papel o tijera alcohólico: Jugad una partida rápida. El que pierda se bebe la mitad de su vaso de un solo trago largo.",
"El barman ciego: {P1} cierra los ojos y saca la lengua. {P2} pone una gota de su bebida en ella. Si {P1} no adivina qué alcohol es, se toma un chupito limpio.",
"Regla estúpida: Durante los próximos 3 turnos, ninguno de los dos puede tocar su copa con la mano dominante. Quien falle, penalty de un trago.",
"Apuesta de bar: {P1} tiene que adivinar si la lencería o ropa interior de {P2} hoy es lisa o tiene algún estampado/encaje. Si falla, {P1} se mete dos tragos.",
"El dictador: {P1} obliga a {P2} a beber cada vez que {P1} use la palabra 'alcohol' durante este turno. ¡Habla con cuidado!",
"Chupito entrelazado: Para demostrar el compadreo, {P1} y {P2} cruzan sus brazos y se toman un chupito entero a la vez sin tirar nada.",
"{P1} debe adivinar de qué color es la prenda superior que lleva {P2} debajo de la sudadera o camiseta (sin mirar). Si falla, fondo blanco a su vaso.",
"El espejo maldito: {P1} tiene que beber exactamente la misma cantidad que beba {P2} en este turno, pero multiplicada por dos. ¡Dale caña, {P2}!",
"Pulsaciones altas: {P2} le toma el pulso a {P1} en la muñeca mientras le cuenta una anécdota subida de tono. Si el pulso se acelera, {P1} se toma un chupito."
];

const poolFase2Orig=[
"El chupito del traspaso: {P1} se mete un sorbo de alcohol en la boca y debe pasárselo a {P2} directamente de boca a boca sin que se caiga una gota. ¡Habilidad pura!",
"Cosquillas con castigo: {P1} le hace cosquillas salvajes a {P2} en los costados durante 10 segundos. Por cada quejido o risa que suelte {P2}, es un trago largo para ella.",
"{P1} debe guiar la mano de {P2} por dentro de su camiseta para que le toque la espalda o el abdomen descalzo, mientras {P1} se baja media copa de golpe.",
"El barman atrevido: {P1} vierte un chorrito de licor en la clavícula o el cuello de {P2} y debe tomárselo directamente con los labios. Si le da timidez, dos chupitos de castigo.",
"Beso de película: {P1} y {P2} deben morder el mismo hielo a la vez por los extremos opuestos y aguantar así mientras se toman un trago largo cada uno.",
"El relevo motero: {P1} se sienta detrás de {P2} abrazándola por la cintura, y tiene que sostenerle el vaso en la boca para que {P2} beba tres tragos seguidos.",
"Roce eléctrico: {P1} debe pasar sus manos lentamente por los muslos de {P2} (por encima de la ropa) mientras {P2} intenta recitar el abecedario al revés. Si se equivoca, chupito.",
"El escáner de barra: {P1} mira a {P2} de arriba a abajo como si la estuviera juzgando en una discoteca. Mientras dure la mirada (15 segundos), {P2} no para de beber.",
"Sin manos 2.0: {P1} tiene que levantar el vaso de {P2} de la mesa usando solo la boca y conseguir que {P2} dé un trago de él. Si se derrama, castigo para los dos.",
"El secreto del bar: {P1} le confiesa a {P2} cuál es la mayor locura que ha hecho estando borracho en su vida. Si la historia es floja, {P2} le manda un chupito.",
"La mordida de hombro: {P1} le da un mordisco juguetón en el hombro a {P2} (por encima de la ropa). Si {P2} se queja, se toma un trago largo. Si le gusta, brinda.",
"Líneas calientes: {P1} tiene que decirle a {P2} el piropo más basto, divertido y sugerente que se le ocurra mirándola a los ojos. Si alguno se ríe, chupito para ese."
];

const poolFase3Orig=[
"RETO DE VELOCIDAD: {P1} tiene 5 segundos para intentar desabrochar un botón o el cierre de una prenda de {P2} usando únicamente los dedos de una mano. Si falla, chupito doble.",
"DESAFÍO DEL HIELO BRUTAL: Ambos se meten un hielo en la boca. El primero que consiga masticarlo o derretirlo del todo le mete tres chupitos seguidos de castigo al otro.",
"EL PULSO DE BAR: Agarraos de las manos y haced un pulso clásico sobre la mesa. El que pierda se toma un fondo blanco de su vaso inmediatamente.",
"RETO A CIEGAS: {P1} se tapa los ojos. {P2} frota un vaso helado por alguna zona de la piel de {P1}. Si {P1} no adivina el sitio exacto en 3 segundos, se bebe el vaso.",
"AGUANTE DE TRAGO: Los dos empezáis a beber de vuestros vasos a la vez. El primero que se quede sin aire o pare de tragar pierde el reto y se quita una prenda.",
"RETO FÍSICO GAMBERRO: {P1} tiene que cargar a hombros o en vilo a {P2} durante 10 segundos enteros. Si fallan o se caen, penalización de alcohol máxima para los dos."
];

const poolSexual=[
"¡FIN DEL JUEGO GUIADO! El motor por turnos ha terminado. A partir de aquí la barra libre es totalmente vuestra y los retos los ponéis vosotros en el colchón. ¡Que se os dé bien!"
];

let poolFase1 = JSON.parse(JSON.stringify(poolFase1Orig));
let poolFase2 = JSON.parse(JSON.stringify(poolFase2Orig));
let poolFase3 = JSON.parse(JSON.stringify(poolFase3Orig));

window.onload=function(){for(let i=1;i<=2;i++) addPlayerRow();}

function addPlayerRow(){const container=document.getElementById('playersContainer');const count=container.children.length+1;const row=document.createElement('div');row.className='player-row';row.innerHTML=`<input type="text" class="input-field p-name" placeholder="Nombre ${count}"><select class="select-sex p-sex" style="display:none;"><option value="H">M</option></select>`;container.appendChild(row);}

document.getElementById('startBtn').addEventListener('click',()=>{players=[];const names=document.getElementsByClassName('p-name');for(let i=0;i<names.length;i++){let n=names[i].value.trim();if(n){players.push({id: i, name:n});}}if(players.length<2){alert("Introduce los 2 nombres.");return;}document.getElementById('setupSection').style.display='none';document.getElementById('gameArea').style.display='flex';getCard();});

function getCard(){let rawText="";const activePlayer=players[currentTurn];const nextPlayer=players[(currentTurn+1)%players.length];if(climaxStage===0){let poolTier=poolFase1;if(cardCount>6) poolTier=poolFase2;if(poolTier.length===0) poolTier=poolFase2Orig;let idx=Math.floor(Math.random()*poolTier.length);rawText=poolTier[idx];poolTier.splice(idx,1);}else if(climaxStage===1){let poolTier=poolFase3;if(poolTier.length===0) poolTier=poolFase3Orig;let idx=Math.floor(Math.random()*poolTier.length);rawText=poolTier[idx];poolTier.splice(idx,1);}else{rawText=poolSexual[0];}let finalInstruction=rawText.replace(/{P1}/g,activePlayer.name).replace(/{P2}/g,nextPlayer.name);document.getElementById('cardInstruction').innerHTML=finalInstruction;document.getElementById('turnIndicator').textContent=`Turno de: ${activePlayer.name}`;const consQ=document.getElementById('cardConsequence');if(climaxStage===0 || climaxStage===1){if(penitenceToggle===0){consQ.innerHTML=`<strong>PENITENCIA OBLIGATORIA:</strong> Si ${activePlayer.name} no cumple el reto, se quita **una prenda de ropa** ahora mismo.`;penitenceToggle=1;}else{consQ.innerHTML=`<strong>PENITENCIA OBLIGATORIA:</strong> Si ${activePlayer.name} no cumple el reto, se mete **un chupito fondo blanco** ya.`;penitenceToggle=0;}}else{consQ.innerHTML=`Fase libre activa.`;}}document.getElementById('nextCardBtn').addEventListener('click',()=>{cardCount++;currentTurn=(currentTurn+1)%players.length;if(cardCount>=4 && climaxStage===0){document.getElementById('climaxBtn').style.display='block';}getCard();});document.getElementById('climaxBtn').addEventListener('click',()=>{if(climaxStage===0){climaxStage=1;cardCount=0;document.getElementById('climaxBtn').textContent="Alguien más se ha desnudado";getCard();}else if(climaxStage===1){climaxStage=2;cardCount=0;document.getElementById('climaxBtn').style.display='none';getCard();}});</script></body></html>
