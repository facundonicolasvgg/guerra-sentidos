let usedNormalCards=[];

function getCard(){
    let rawText="";
    let imgUrl="";
    
    if(climaxMode){
        if(climaxIndex < sexualCards.length){
            rawText = sexualCards[climaxIndex].text;
            imgUrl = sexualCards[climaxIndex].img;
        }else{
            rawText = sexualCards[sexualCards.length-1].text;
            imgUrl = sexualCards[sexualCards.length-1].img;
        }
    }else{
        if(usedNormalCards.length === normalCards.length){
            usedNormalCards = [];
        }
        let randomIndex;
        do{
            randomIndex = Math.floor(Math.random()*normalCards.length);
        }while(usedNormalCards.includes(randomIndex));
        
        usedNormalCards.push(randomIndex);
        rawText = normalCards[randomIndex];
    }
    
    const v = players[currentTurn];
    const o = players[(currentTurn+1)%2];
    
    document.getElementById('cardInstruction').innerHTML = climaxMode ? rawText : rawText.replace(/{V}/g,v).replace(/{O}/g,o);
    
    const imgDiv = document.getElementById('posImage');
    if(climaxMode && imgUrl){
        imgDiv.innerHTML = `<img src="${imgUrl}" alt="Posición">`;
        imgDiv.style.display = 'flex';
    }else{
        imgDiv.style.display = 'none';
    }
    
    const consQ = document.getElementById('cardConsequence');
    if(climaxMode){
        consQ.innerHTML = `<strong>MODO CLÍMAX:</strong> Ambos estáis al descubierto. Mantened la posición y disfrutad del momento.`;
    }else{
        // Lógica de penitencia que alterna dinámicamente entre Ropa y Bebida
        if(penitenceToggle === 0){
            consQ.innerHTML = `<strong>SI ${v.toUpperCase()} FALLA:</strong> ${o} elige y le quita **una prenda de ropa** a ${v}.`;
            penitenceToggle = 1;
        }else{
            consQ.innerHTML = `<strong>SI ${v.toUpperCase()} FALLA:</strong> ${v} debe tomarse **un chupito / trago fondo blanco** inmediatamente.`;
            penitenceToggle = 0;
        }
    }
    document.getElementById('turnIndicator').textContent = `Turno de: ${v}`;
}

document.getElementById('startBtn').addEventListener('click',()=>{
    const p1 = document.getElementById('p1').value.trim();
    const p2 = document.getElementById('p2').value.trim();
    if(p1 && p2){
        players = [p1,p2];
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('gameArea').style.display = 'flex';
        getCard();
    }else{
        alert("Por favor, introducid ambos nombres para comenzar.");
    }
});

document.getElementById('nextCardBtn').addEventListener('click',()=>{
    if(climaxMode){
        climaxIndex++;
    }else{
        cardCount++;
    }
    currentTurn = (currentTurn+1)%2;
    if(cardCount >= 2 && !climaxMode){
        document.getElementById('climaxBtn').style.display = 'block';
    }
    getCard();
});

document.getElementById('climaxBtn').addEventListener('click',()=>{
    climaxMode = true;
    document.getElementById('climaxBtn').style.display = 'none';
    currentTurn = (currentTurn+1)%2;
    climaxIndex = 0;
    getCard();
});
