<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>La Guerra de los Sentidos</title><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><style>:root{--bg:#0b0612;--card-bg:#160f24;--accent:#ff2a5f;--accent-sub:#9d1df2;--text:#ffffff;--text-muted:#a59ba3;}body{margin:0;padding:20px;background:radial-gradient(circle at top, #1a0b2e, var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;box-sizing:border-box;}header{text-align:center;margin-bottom:15px;}h1{margin:0;font-size:1.8rem;background:linear-gradient(45deg,var(--accent),var(--accent-sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}header p{margin:5px 0 0 0;color:var(--text-muted);font-size:0.85rem;font-style:italic;}.container{width:100%;max-width:420px;display:flex;flex-direction:column;gap:15px;}h3{margin:0 0 10px 0;}.setup-section{background:var(--card-bg);padding:20px;border-radius:20px;border:1px solid #2d1b4e;box-shadow:0 10px 30px rgba(0,0,0,0.5);}.input-group{display:flex;flex-direction:column;gap:10px;margin-top:15px;}.input-field{padding:12px;border-radius:10px;border:1px solid #443266;background:#201435;color:white;font-size:1rem;}.btn{padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(255,42,95,0.3);transition:transform 0.1s;}.btn-climax{background:linear-gradient(45deg, #cc0000, #660022);border:1px solid #ff0055;margin-top:5px;display:none;}#gameArea{display:none;flex-direction:column;gap:15px;width:100%;}.turn-indicator{text-align:center;font-size:1.1rem;font-weight:bold;color:#ffde59;}.card-container{perspective:1000px;width:100%;min-height:340px;}.game-card{width:100%;height:100%;background:#201633;border:2px solid var(--accent);border-radius:20px;padding:20px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 25px rgba(0,0,0,0.6);}.card-instruction{font-size:1.1rem;line-height:1.4;color:#e2d9f3;margin-bottom:10px;font-weight:500;}.pos-image{display:none;flex-direction:column;justify-content:center;align-items:center;margin:10px 0;background:#0d0818;padding:10px;border-radius:15px;border:1px solid rgba(255,42,95,0.4);}.pos-image img{width:100%;max-height:180px;object-fit:contain;border-radius:10px;}.file-input-label{background:#443266;padding:8px 12px;border-radius:8px;font-size:0.8rem;cursor:pointer;margin-top:8px;display:inline-block;}.card-consequence{background:rgba(255,42,95,0.1);border:1px dashed var(--accent);padding:10px;border-radius:8px;font-size:0.85rem;color:#ff7ea0;}</style></head><body><header><h1>La Guerra de los Sentidos</h1><p>Versión App Privada</p></header><div class="container"><div class="setup-section" id="setupSection"><h3>Configuración</h3><p style="font-size:0.9rem;color:var(--text-muted);margin:0;">Introducid vuestros nombres para empezar:</p><div class="input-group"><input type="text" id="p1" class="input-field" placeholder="Jugador/a 1"><input type="text" id="p2" class="input-field" placeholder="Jugador/a 2"><button class="btn" id="startBtn">Comenzar</button></div></div><div id="gameArea"><div class="turn-indicator" id="turnIndicator">Turno</div><div class="card-container"><div class="game-card"><div class="card-instruction" id="cardInstruction">Instrucción...</div><div class="pos-image" id="posImage"><div id="imgContainer"></div><label class="file-input-label">▲ Cargar foto para esta posición<input type="file" id="filePicker" accept="image/*" style="display:none;"></label></div><div class="card-consequence" id="cardConsequence">Penitencia...</div></div></div><button class="btn" id="nextCardBtn">Siguiente Tarjeta</button><button class="btn btn-climax" id="climaxBtn">Cuando alguien se quede desnudo pulsar el botón 🔞</button></div></div><script>let players=[];let currentTurn=0;let cardCount=1;let climaxMode=false;let climaxIndex=0;let savedImages={};const normalCards=["{O} debe vendarle los ojos a {V}. {O} preparará un sorbo de alguna bebida disponible. {V} debe adivinar qué bebida es solo por el gusto y el olor.","{V} se tapa los ojos. {O} debe susurrarle una frase al oído de forma muy suave y lenta.","{V} cierra los ojos. {O} le dará a probar un trozo pequeño de cualquier alimento disponible."];const sexualCards=[{id:"misionero",text:"¡POSICIÓN: EL MISIONERO! {O} realiza la penetración colocándose encima de {V}. Es la postura ideal para mirarse y besarse de forma romántica e intensa."},{id:"arriba",text:"¡POSICIÓN: ELLA ARRIBA! {O} se tumba bocarriba y {V} se coloca encima. {V} tiene el control total del ritmo y la profundidad."},{id:"cuchara",text:"¡POSICIÓN: LA CUCHARA! Ambos os colocáis tumbados de lado, mirando en la misma dirección. Una postura comodísima y muy placentera."},{id:"atras",text:"¡POSICIÓN: DESDE ATRÁS! {V} apoya las rodillas y las manos en la cama de forma cómoda. {O} se sitúa detrás para una penetración muy directa."},{id:"final",text:"¡CONEXIÓN FINAL! Elegid vuestra posición favorita. El juego ha terminado, disfrutad por completo con total libertad."}];function checkClimaxButton(){if(cardCount>=3&&!climaxMode){document.getElementById('climaxBtn').style.display='block';}}function getCard(){let rawText="";let currentCardId="";if(climaxMode){if(climaxIndex<sexualCards.length){rawText=sexualCards[climaxIndex].text;currentCardId=sexualCards[climaxIndex].id;}else{rawText=sexualCards[sexualCards.length-1].text;currentCardId=sexualCards[sexualCards.length-1].id;}}else{rawText=normalCards[Math.floor(Math.random()*normalCards.length)];}const v=players[currentTurn];const o=players[(currentTurn+1)%2];document.getElementById('cardInstruction').innerHTML=rawText.replace(/{V}/g,v).replace(/{O}/g,o);const imgDiv=document.getElementById('posImage');const imgContainer=document.getElementById('imgContainer');if(climaxMode&&currentCardId&&currentCardId!=="final"){imgDiv.style.display='flex';if(savedImages[currentCardId]){imgContainer.innerHTML=`<img src="${savedImages[currentCardId]}" alt="Foto">`;}else{imgContainer.innerHTML=`<p style="font-size:0.85rem;color:var(--text-muted);margin:5px 0;">No hay foto cargada para esta postura.</p>`;}}else{imgDiv.style.display='none';}document.getElementById('turnIndicator').textContent=`Turno de: ${v}`;}document.getElementById('filePicker').addEventListener('change',(e)=>{const file=e.target.files[0];if(file&&climaxMode){const reader=new FileReader();reader.onload=(event)=>{const currentCardId=sexualCards[climaxIndex].id;savedImages[currentCardId]=event.target.result;getCard();};reader.readAsDataURL(file);}});document.getElementById('startBtn').addEventListener('click',()=>{const p1=document.getElementById('p1').value.trim();const p2=document.getElementById('p2').value.trim();if(p1&&p2){players=[p1,p2];document.getElementById('setupSection').style.display='none';document.getElementById('gameArea').style.display='flex';getCard();}else{alert("Por favor, introducid ambos nombres.");}});document.getElementById('nextCardBtn').addEventListener('click',()=>{if(climaxMode){climaxIndex++;}else{cardCount++;}currentTurn=(currentTurn+1)%2;checkClimaxButton();getCard();});document.getElementById('climaxBtn').addEventListener('click',()=>{climaxMode=true;document.getElementById('climaxBtn').style.display='none';currentTurn=(currentTurn+1)%2;getCard();});</script></body></html>
