<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>La Guerra de los Sentidos - Dúo Caliente</title><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><style>:root{--bg:#0b0612;--card-bg:#160f24;--accent:#ff2a5f;--accent-sub:#9d1df2;--text:#ffffff;--text-muted:#a59ba3;}body{margin:0;padding:20px;background:radial-gradient(circle at top, #1a0b2e, var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;box-sizing:border-box;}header{text-align:center;margin-bottom:15px;}h1{margin:0;font-size:1.8rem;background:linear-gradient(45deg,var(--accent),var(--accent-sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}header p{margin:5px 0 0 0;color:var(--text-muted);font-size:0.85rem;font-style:italic;}.container{width:100%;max-width:440px;display:flex;flex-direction:column;gap:15px;}h3{margin:0 0 10px 0;}.setup-section{background:var(--card-bg);padding:20px;border-radius:20px;border:1px solid #2d1b4e;box-shadow:0 10px 30px rgba(0,0,0,0.5);}.player-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}.input-field{padding:12px;border-radius:10px;border:1px solid #443266;background:#201435;color:white;font-size:1rem;flex:1;box-sizing:border-box;}.select-sex{padding:12px;border-radius:10px;border:1px solid #443266;background:#201435;color:white;font-size:1rem;cursor:pointer;}.btn{padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(255,42,95,0.3);width:100%;box-sizing:border-box;margin-top:5px;}.btn-secondary{background:#3b2366;box-shadow:none;margin-bottom:10px;}.btn-climax{background:linear-gradient(45deg, #2a085c, #660022);border:1px solid #ff0055;margin-top:10px;display:none;}#gameArea{display:none;flex-direction:column;gap:15px;width:100%;}.turn-indicator{text-align:center;font-size:1.1rem;font-weight:bold;color:#ffde59;margin-bottom:5px;}.game-card{width:100%;background:#201633;border:2px solid var(--accent);border-radius:20px;padding:25px;box-sizing:border-box;display:flex;flex-direction:column;box-shadow:0 8px 25px rgba(0,0,0,0.6);}.card-instruction{font-size:1.15rem;line-height:1.5;color:#e2d9f3;margin-bottom:15px;font-weight:500;}.card-consequence{background:rgba(255,42,95,0.1);border:1px dashed var(--accent);padding:12px;border-radius:8px;font-size:0.9rem;color:#ff7ea0;margin-top:10px;line-height:1.4;}.secret-area{background:#110a1c;border:1px solid var(--accent-sub);border-radius:12px;padding:15px;margin-top:10px;display:flex;flex-direction:column;gap:10px;}</style></head><body><header><h1>La Guerra de los Sentidos</h1><p>Edición Dúo & Barra Libre</p></header><div class="container"><div class="setup-section" id="setupSection"><h3>Participantes (Mínimo 2)</h3><div id="playersContainer"></div><button class="btn btn-secondary" id="addPlayerBtn" style="display:none;">+ Añadir Jugador/a</button><button class="btn" id="startBtn">Comenzar Desafío</button></div><div id="gameArea"><div class="turn-indicator" id="turnIndicator">Turno de...</div><div class="game-card"><div class="card-instruction" id="cardInstruction">Preparando alcohol...</div><div id="secretContainer"></div><div class="card-consequence" id="cardConsequence">Penitencia...</div></div><button class="btn" id="nextCardBtn">Siguiente Tarjeta</button><button class="btn btn-climax" id="climaxBtn">Alguien se ha quedado sin ropa</button></div></div><script>let players=[];let currentTurn=0;let cardCount=1;let climaxStage=0;let secretChoices={};let playersPromptedSecret=[];let penitenceToggle=0;

const poolFase1Orig=[
"{P1} debe servir un chupito extra, rellenarlo hasta el borde y bebérselo de golpe antes de mirar fijamente a los ojos de {P2} durante 20 segundos sin sonreír.",
"Trago de sincronización: Ambos debéis juntar vuestros vasos y beber tres tragos largos al mismo tiempo mirándoos fijamente.",
"{P1} tiene que recitar los ingredientes de su cóctel o bebida favorita. Por cada uno que olvide o tarde en decir, se toma un sorbo obligatorio.",
"El juego del reflejo: {P1} debe imitar exactamente cómo bebe {P2}. {P2} da tres sorbos a ritmos diferentes, si {P1} pierde el hilo, se toma un chupito.",
"Cascada para dos: Ambos empiezan a beber a la vez. {P1} no puede parar hasta que {P2} decida bajar su copa. ¡Poneos a prueba!",
"{P1} debe susurrarle al oído a {P2} una palabra picante. Si {P2} se estremece o cambia la expresión de la cara, {P2} se toma un trago largo.",
"Piedra, papel o tijera alcohólico: El que pierda de los dos se toma dos chupitos seguidos o la mitad de su vaso actual de un trago.",
"El barman ciego: {P1} cierra los ojos. {P2} le da a oler o probar su copa. Si {P1} no adivina qué mezcla exacta lleva, fondo blanco.",
"Regla express: Durante los próximos 3 turnos, está totalmente prohibido tocar el vaso con la mano derecha. El que caiga en la trampa, bebe.",
"¿Qué prefieres alcohólico? {P1} elije en voz alta: ¿Beberte la copa de {P2} entera de un trago o dejar que {P2} te pida el reto que quiera? Cumple o bebe.",
"Todos los botones: Si alguno de los dos lleva una prenda con botones o cremalleras, se toma un trago largo por cada botón/cremallera que tenga visibles.",
"El dictador del trago: {P1} inventa una palabra prohibida para este turno. Cada vez que cualquiera de los dos la use sin querer, sorbo al canto.",
"{P1} debe adivinar cuántos tragos le quedan a {P2} para acabar su vaso. Si falla por más de un trago, {P1} se toma un chupito castigo.",
"Chupito cruzado: {P1} y {P2} deben entrelazar sus brazos y beber un chupito entero simultáneamente sin derramar una sola gota.",
"{P1} debe tararear una canción sugerente mientras da pequeños sorbos a su copa. Si {P2} no la adivina en 15 segundos, {P2} bebe.",
"El termómetro: {P2} toca el cuello o la muñeca de {P1}. Si siente que está caliente, {P1} se toma un trago; si está frío, se lo toma {P2}.",
"Dados imaginarios: Ambos lanzan un dado invisible. El que saque el número más bajo se toma dos tragos potentes de su copa."
];

const poolFase2Orig=[
"El trago del beso: {P1} toma un sorbo generoso de alcohol, lo mantiene en la boca y debe pasárselo limpiamente a {P2} mediante un beso directo.",
"Masaje de alta graduación: {P1} debe verter unas gotas de alcohol en su dedo, masajear el lóbulo de la oreja de {P2} y luego limpiarlo con los labios.",
"{P1} tiene que guiar la mano de {P2} por debajo de su camiseta durante 15 segundos mientras se toma un trago largo con la otra mano.",
"Beso magnético alcohólico: Sostened un chupito entre los labios de ambos (sin usar las manos) e intentad beberlo a medias sin tirar nada.",
"Abrazo de tensión: {P1} y {P2} se abrazan fuertemente pecho contra pecho durante 30 segundos. El que se mueva o hable primero, fondo blanco.",
"El relevo de la copa: {P1} se coloca detrás de {P2}, le abraza por la cintura y le da de beber directamente de su vaso sosteniéndolo con la mano.",
"El juego del hielo: {P1} se mete un hielo en la boca y debe frotarlo rápidamente por el cuello o la clavícula de {P2}. Si gotea, {P1} se toma un chupito.",
"Roce prohibido: {P1} pasa sus manos lentamente por los muslos de {P2} (por fuera de la ropa) mientras {P2} se toma tres tragos seguidos sin apartar la mirada.",
"Almas gemelas: A la de tres, ambos debéis decir vuestro licor favorito. Si no coincidéis exactamente, los dos os tomáis un chupito limpio.",
"El escáner visual: {P1} mira fijamente el cuerpo de {P2} durante 15 segundos. Mientras dure el escaneo, {P2} debe beber de su copa continuamente.",
"Sin manos: {P1} debe coger el vaso de {P2} utilizando únicamente los dientes y dar un sorbo largo sin ayudarse de los brazos.",
"El susurro del barman: {P1} le dice al oído a {P2} una fantasía general de barra de bar. {P2} bebe un trago largo para asimilar el impacto.",
"Cosquillas con penalización: {P1} le hace cosquillas a {P2} durante 10 segundos. Si {P2} emite algún sonido, se toma un chupito de golpe.",
"El final del preludio: {P1} debe besar la mano de {P2} e ir subiendo lentamente por el brazo hasta el cuello mientras {P2} termina su vaso."
];

const poolFase3Orig=[
"RETO DE VELOCIDAD: {P1} debe intentar desabrochar un botón o el cierre de una prenda de {P2} usando solo una mano. Si tarda más de 5 segundos, {P1} se toma un chupito.",
"DESAFÍO DEL HIELO: Ambos os colocáis un hielo en la boca. El primero en derretirlo por completo obliga al otro a tomarse un fondo blanco completo.",
"EL PULSO FISICO: Agarraos de las manos firmemente haciendo fuerza. Quien ceda o pierda el equilibrio se toma dos chupitos seguidos.",
"RETO DEL GUÍA CIEGO: {P1} cierra los ojos. {P2} pasa un vaso frío por el torso de {P1}. Si {P1} no adivina la zona exacta en 3 segundos, bebe.",
"DUELO DE TRAGOS: Ambos empezáis a beber de vuestros vasos al mismo tiempo. El primero que pare de tragar pierde el reto y recibe un castigo.",
"RETO CUERPO A CUERPO: {P1} debe levantar o cargar a {P2} durante 10 segundos seguidos. Si no puede o se desestabiliza, penalty de alcohol para ambos."
];

const poolSexual=[
"¡CLÍMAX INDEPENDIENTE! El juego guiado por turnos termina aquí de forma definitiva. Dejad los vasos a un lado, acomodaos en el colchón y disfrutad el uno del otro a vuestro propio ritmo."
];

let poolFase1 = JSON.parse(JSON.stringify(poolFase1Orig));
let poolFase2 = JSON.parse(JSON.stringify(poolFase2Orig));
let poolFase3 = JSON.parse(JSON.stringify(poolFase3Orig));

window.onload=function(){for(let i=1;i<=2;i++) addPlayerRow();}

function addPlayerRow(){const container=document.getElementById('playersContainer');const count=container.children.length+1;const row=document.createElement('div');row.className='player-row';row.innerHTML=`<input type="text" class="input-field p-name" placeholder="Jugador/a ${count}"><select class="select-sex p-sex"><option value="H">M ♂️</option><option value="M">F ♀️</option></select>`;container.appendChild(row);}

document.getElementById('startBtn').addEventListener('click',()=>{players=[];const names=document.getElementsByClassName('p-name');const sexes=document.getElementsByClassName('p-sex');for(let i=0;i<names.length;i++){let n=names[i].value.trim();if(n){players.push({id: i, name:n, sex:sexes[i].value});}}if(players.length<2){alert("Introduce a los 2 participantes.");return;}document.getElementById('setupSection').style.display='none';document.getElementById('gameArea').style.display='flex';getCard();});

function getCard(){document.getElementById('secretContainer').innerHTML="";document.getElementById('cardConsequence').style.display="block";let rawText="";const activePlayer=players[currentTurn];const nextPlayer=players[(currentTurn+1)%players.length];if(climaxStage===0 && cardCount > 3 && !playersPromptedSecret.includes(activePlayer.id) && playersPromptedSecret.length < players.length){generateSecretPromptStep1(activePlayer);return;}if(climaxStage===0){let poolTier=poolFase1;if(cardCount>6) poolTier=poolFase2;if(poolTier.length===0) poolTier=poolFase2Orig;let idx=Math.floor(Math.random()*poolTier.length);rawText=poolTier[idx];poolTier.splice(idx,1);}else if(climaxStage===1){let poolTier=poolFase3;if(poolTier.length===0) poolTier=poolFase3Orig;let idx=Math.floor(Math.random()*poolTier.length);rawText=poolTier[idx];poolTier.splice(idx,1);}else{rawText=poolSexual[0];}let finalInstruction=rawText.replace(/{P1}/g,activePlayer.name).replace(/{P2}/g,nextPlayer.name);document.getElementById('cardInstruction').innerHTML=finalInstruction;document.getElementById('turnIndicator').textContent=`Turno de: ${activePlayer.name}`;const consQ=document.getElementById('cardConsequence');if(climaxStage===0 || climaxStage===1){if(penitenceToggle===0){consQ.innerHTML=`<strong>PENITENCIA INAPELABLE:</strong> Si ${activePlayer.name} falla o se niega, se quita **una prenda de ropa** ya.`;penitenceToggle=1;}else{consQ.innerHTML=`<strong>PENITENCIA INAPELABLE:</strong> Si ${activePlayer.name} falla o se niega, se toma **un chupito fondo blanco** ya.`;penitenceToggle=0;}}else{consQ.innerHTML=`Fase final activa.`;}}

function generateSecretPromptStep1(player){document.getElementById('turnIndicator').textContent=`Test de Afinidad`;document.getElementById('cardConsequence').style.display="none";document.getElementById('cardInstruction').innerHTML=`<div style='text-align:center; padding:10px;'>🔒 <strong>PREGUNTA DE COINCIDENCIA</strong><br><br><span style='font-size:1.2rem; color:#ffde59;'>Pasa el móvil en secreto a: <br><strong>${player.name}</strong></span><br><br><small style='color:var(--text-muted);'>El otro jugador no debe mirar la pantalla.</small></div>`;const container=document.getElementById('secretContainer');container.innerHTML=`<button class="btn" id="revealSecretBtn" style="background:var(--accent-sub); margin-top:15px;">Soy ${player.name}, responder</button>`;document.getElementById('revealSecretBtn').addEventListener('click',()=>{generateSecretPromptStep2(player);});}

function generateSecretPromptStep2(player){playersPromptedSecret.push(player.id);document.getElementById('cardInstruction').innerHTML=`🔒 <strong>RESPONDE CON SINCERIDAD</strong><br><small style='color:#ff7ea0;'>Si vuestras respuestas no coinciden al final, ¡ambos bebéis chupito!</small>`;const container=document.getElementById('secretContainer');container.innerHTML=`<div class="secret-area"><label style="font-size:0.95rem;color:#dfbaff;">¿Qué prefieres priorizar de tu pareja en la cama esta noche?</label><select id="secretSelect" class="select-sex" style="width:100%; margin-top:5px;"><option value="A">Acción rápida e intensa 🔥</option><option value="B">Juego previo largo y sensual 🧸</option></select><button class="btn" id="saveSecretBtn" style="background:var(--accent);">Confirmar voto</button></div>`;document.getElementById('saveSecretBtn').addEventListener('click',()=>{const val=document.getElementById('secretSelect').value;secretChoices[player.id]=val;container.innerHTML=`<p style="color:#00ff88; font-weight:bold; text-align:center;">Voto registrado.</p>`;setTimeout(()=>{if(playersPromptedSecret.length===players.length){evalTwoPlayerMatches();}else{currentTurn=(currentTurn+1)%players.length;getCard();}},1200);});}

function evalTwoPlayerMatches(){document.getElementById('turnIndicator').textContent=`Resultado del Test`;const p0=secretChoices[0];const p1=secretChoices[1];const container=document.getElementById('secretContainer');if(p0===p1){document.getElementById('cardInstruction').innerHTML=`¡Sintonía total! 🥂<br><br>Habéis elegido exactamente lo mismo en secreto. Os libráis del castigo y podéis continuar el juego con un brindis suave.`;}else{document.getElementById('cardInstruction').innerHTML=`¡Falta de sintonía! 🥃💥<br><br>No habéis coincidido en vuestras respuestas secretas. Como penalización, **¡los dos os tomáis un chupito fondo blanco ahora mismo!**`;}container.innerHTML=`<button class="btn" id="resumeGameBtn" style="background:var(--accent); margin-top:15px;">Continuar Juego</button>`;document.getElementById('resumeGameBtn').addEventListener('click',()=>{currentTurn=(currentTurn+1)%players.length;getCard();});}

document.getElementById('nextCardBtn').addEventListener('click',()=>{cardCount++;currentTurn=(currentTurn+1)%players.length;if(cardCount>=4 && climaxStage===0){document.getElementById('climaxBtn').style.display='block';}getCard();});

document.getElementById('climaxBtn').addEventListener('click',()=>{if(climaxStage===0){climaxStage=1;cardCount=0;document.getElementById('climaxBtn').textContent="Otra prenda menos";getCard();}else if(climaxStage===1){climaxStage=2;cardCount=0;document.getElementById('climaxBtn').style.display='none';getCard();}});</script></body></html>
